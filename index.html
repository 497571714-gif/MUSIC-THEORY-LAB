<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐理感官实验室</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; color: white;
        }
        #start-button {
            padding: 15px 40px; font-size: 20px; background: #e67e22;
            color: white; border: none; border-radius: 30px; cursor: pointer;
        }
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.1); display: flex; flex-direction: column;
            align-items: center; gap: 10px; padding: 10px; z-index: 10; 
        }
        .nav-btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 5px 15px; cursor: pointer; border-radius: 5px;
        }
        .active-btn { background: #3498db !important; }
        .option-container { display: none; margin-top: 10px; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .quiz-btn { background: #2ecc71; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #feedback { color: #f1c40f; font-weight: bold; margin-top: 5px; height: 20px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>乐理感官实验室</h1>
        <button id="start-button" onclick="activateAll()">开启实验</button>
    </div>

    <div id="ui-layer">
        <div id="main-nav">
            <button class="nav-btn active-btn" onclick="changeMode(this, 'pitch')">音高</button>
            <button class="nav-btn" onclick="changeMode(this, 'beat')">节拍挑战</button>
            <button class="nav-btn" onclick="changeMode(this, 'volume')">力度挑战</button>
            <button class="nav-btn" onclick="changeMode(this, 'chord')">和弦</button>
        </div>
        <div id="feedback"></div>
        
        <div id="beat-options" class="option-container">
            <button class="quiz-btn" onclick="checkBeat(2)">2/4 拍</button>
            <button class="quiz-btn" onclick="checkBeat(3)">3/4 拍</button>
            <button class="quiz-btn" onclick="checkBeat(4)">4/4 拍</button>
        </div>

        <div id="volume-options" class="option-container">
            <button class="quiz-btn" onclick="checkVolume(0)">p (弱)</button>
            <button class="quiz-btn" onclick="checkVolume(1)">mp (中弱)</button>
            <button class="quiz-btn" onclick="checkVolume(2)">mf (中强)</button>
            <button class="quiz-btn" onclick="checkVolume(3)">f (强)</button>
        </div>
    </div>

    <script>
        function activateAll() {
            document.getElementById('start-screen').style.display = 'none';
            if (window.startLabAudio) window.startLabAudio();
        }

        function changeMode(btn, modeName) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            
            document.getElementById('beat-options').style.display = (modeName === 'beat') ? 'flex' : 'none';
            document.getElementById('volume-options').style.display = (modeName === 'volume') ? 'flex' : 'none';
            document.getElementById('feedback').innerText = "";
            
            if (window.setLabMode) window.setLabMode(modeName);
        }

        function checkBeat(ans) {
            if (window.submitBeatAnswer) {
                let res = window.submitBeatAnswer(ans);
                updateFeedback(res);
            }
        }

        function checkVolume(ans) {
            if (window.submitVolumeAnswer) {
                let res = window.submitVolumeAnswer(ans);
                updateFeedback(res);
            }
        }

        function updateFeedback(res) {
            let fb = document.getElementById('feedback');
            if (res.isCorrect) {
                fb.innerText = "正确！" + (res.isFinished ? "" : "进入下一关...");
                fb.style.color = "#2ecc71";
            } else {
                fb.innerText = "感受错误，请再次观察视觉波纹...";
                fb.style.color = "#e74c3c";
            }
        }
    </script>
    <script src="sketch.js"></script>
</body>
</html>
