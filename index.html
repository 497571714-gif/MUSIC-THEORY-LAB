<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>乐理感官实验室</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; justify-content:center; align-items:center;">
    <button onclick="startLab()" style="padding:20px 40px; font-size:20px;">点击进入实验室（激活音频与感官）</button>
</div>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; z-index: 10; }
        button { margin-right: 5px; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; justify-content:center; align-items:center;">
    <button onclick="startLab()" style="padding:20px 40px; font-size:20px;">点击进入实验室（激活音频与感官）</button>
</div>
    <div id="ui-layer">
        <h2 id="title">音高实验室</h2>
        <button onclick="setMode('pitch')">1. 音高</button>
        <button onclick="setMode('beat')">2. 节拍</button>
        <button onclick="setMode('volume')">3. 力度</button>
        <button onclick="setMode('chord')">4. 和弦</button>
        <p id="hint">点击屏幕开始互动</p>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
