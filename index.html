<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐理感官实验室</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; color: white;
        }
        #start-button {
            padding: 15px 40px; font-size: 20px; background: #e67e22;
            color: white; border: none; border-radius: 30px; cursor: pointer;
        }
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(255,255,255,0.1); display: flex; 
            justify-content: center; gap: 10px; padding: 10px; z-index: 10; 
        }
        .nav-btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 5px 15px; cursor: pointer; border-radius: 5px;
        }
        .active-btn { background: #3498db !important; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>乐理感官实验室</h1>
        <p>基于中学生一级乐理教学框架</p>
        <button id="start-button" onclick="activateAll()">开启实验</button>
    </div>

    <div id="ui-layer">
        <button class="nav-btn active-btn" onclick="changeMode(this, 'pitch')">音高</button>
        <button class="nav-btn" onclick="changeMode(this, 'beat')">节拍</button>
        <button class="nav-btn" onclick="changeMode(this, 'volume')">力度</button>
        <button class="nav-btn" onclick="changeMode(this, 'chord')">和弦</button>
    </div>

    <script>
        function activateAll() {
            // 隐藏启动层
            document.getElementById('start-screen').style.display = 'none';
            // 调用 sketch.js 里的初始化函数
            if (window.startLabAudio) {
                window.startLabAudio();
            }
        }

        function changeMode(btn, modeName) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            if (window.setLabMode) {
                window.setLabMode(modeName);
            }
        }
    </script>
    <script src="sketch.js"></script>
</body>
</html>
